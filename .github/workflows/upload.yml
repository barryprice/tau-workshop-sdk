name: Build and Upload SDK
permissions: {}

on:
  push:
    branches:
      - latest
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name (e.g., latest)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    uses: canonical/sdkcraft-actions/.github/workflows/upload.yml@99381343a0e743cd52c04057ea432fe2a7066859 # main
    with:
      platforms: '["amd64","arm64","ppc64el","s390x","risc64"]'
      platform-flag: "--build-for"
      runs-on: '["ubuntu-latest"]'
    secrets:
      SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS_PROD }}
