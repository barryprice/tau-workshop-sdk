name: tau
adopt-info: tau
summary: The Tau coding-agent SDK for Workshop
description: |
  This SDK provides the Tau AI coding agent for interactive terminal use
  within a workshop. Session history, provider credentials, and user
  configuration are persisted on the host across workshop updates.
license: MIT
platforms:
  ubuntu@26.04:amd64:
  ubuntu@26.04:arm64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:arm64]
  ubuntu@26.04:ppc64el:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:ppc64el]
  ubuntu@26.04:s390x:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:s390x]
  ubuntu@26.04:riscv64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:riscv64]

plugs:
  tau-data:
    interface: mount
    workshop-target: /home/workshop/.tau
    mode: 0o700

parts:
  tau:
    plugin: dump
    source: .
    source-type: local
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
      cp "$CRAFT_PROJECT_DIR/VERSION" "$CRAFT_PART_SRC/VERSION"
    prime:
      - VERSION
